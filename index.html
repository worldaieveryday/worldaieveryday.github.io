---
layout: default
---

<div class="grid">
  {% for post in site.posts limit:12 %}
    <a href="{{ post.url | relative_url }}" class="card-link">
      <div class="card">
        <img src="{{ post.image | default: '/assets/default-image.jpg' | relative_url }}" alt="{{ post.title }}">
        <div class="card-content">
          <div class="card-title">{{ post.title }}</div>
          <div class="card-date">{{ post.date | date: "%Y/%m/%d" }}</div>
        </div>
      </div>
    </a>
  {% endfor %}
</div>
